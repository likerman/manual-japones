name: Publicar manual web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  publicar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Renderizar edición web
        run: quarto render --to html

      - name: Recuperar PDF publicado
        run: |
          mkdir -p _book/downloads
          git fetch origin gh-pages:refs/remotes/origin/gh-pages || true
          git show refs/remotes/origin/gh-pages:downloads/Manual_de_japones.pdf > _book/downloads/Manual_de_japones.pdf || true
          touch _book/.nojekyll

      - name: Habilitar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Cargar sitio para Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: _book

      - name: Desplegar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
