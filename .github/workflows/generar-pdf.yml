name: Generar PDF

on:
  pull_request:
    paths:
      - "**/*.qmd"
      - "_quarto.yml"
      - "estilos/**"
      - ".github/workflows/generar-pdf.yml"
  workflow_run:
    workflows: ["Publicar manual web"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar-pdf:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar fuentes japonesas
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f -v

      - name: Instalar Quarto y TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Generar edición PDF
        run: quarto render --to pdf

      - name: Guardar PDF como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: manual-japones-pdf
          path: _book/*.pdf
          if-no-files-found: error

      - name: Publicar PDF junto a la edición web
        if: github.event_name == 'workflow_run'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" site
          mkdir -p site/downloads
          cp _book/*.pdf site/downloads/Manual_de_japones.pdf
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/Manual_de_japones.pdf
          if git diff --cached --quiet; then
            echo "El PDF publicado ya está actualizado."
            exit 0
          fi
          git commit -m "Actualizar edición PDF desde ${GITHUB_SHA}"
          git push
