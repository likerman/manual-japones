name: Generar PDF

on:
  pull_request:
    paths:
      - "**/*.qmd"
      - "_quarto.yml"
      - "estilos/**"
      - ".github/workflows/generar-pdf.yml"
  push:
    branches: [main]
    paths:
      - "**/*.qmd"
      - "_quarto.yml"
      - "estilos/**"
      - ".github/workflows/generar-pdf.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generar-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar fuentes japonesas
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f -v

      - name: Instalar Quarto y TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Instalar paquetes LaTeX japoneses
        run: tlmgr install koma-script luatexja

      - name: Generar edición PDF
        run: quarto render --to pdf

      - name: Guardar PDF como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: manual-japones-pdf
          path: _book/*.pdf
          if-no-files-found: error
